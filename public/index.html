<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>天选铺子智能推荐</title>
    <link rel="stylesheet" href="/styles.css?v=20260618-markdown" />
  </head>
  <body>
    <div id="loginOverlay" class="login-overlay">
      <div class="login-card">
        <div class="login-brand">
          <div class="agent-mark" aria-hidden="true">
            <span></span>
          </div>
        </div>
        <h1>天选铺子</h1>
        <p class="login-desc">登录后使用智能推荐助手</p>
        <form id="loginForm" class="login-form">
          <label class="login-field">
            <span>账号</span>
            <input type="text" id="loginUsername" autocomplete="username" placeholder="输入账号" />
          </label>
          <label class="login-field">
            <span>密码</span>
            <input type="password" id="loginPassword" autocomplete="current-password" placeholder="输入密码" />
          </label>
          <p id="loginError" class="login-error"></p>
          <button type="submit" class="login-submit">登 录</button>
        </form>
      </div>
    </div>

    <main class="app-shell" id="appShell">
      <section class="chat-panel" aria-label="店铺智能推荐对话框">
        <header class="chat-header">
          <div class="agent-mark" aria-hidden="true">
            <span></span>
          </div>
          <div>
            <p class="eyebrow">智能推荐助手</p>
            <h1>告诉我你想买什么</h1>
          </div>
          <div class="status-pill">
            <span></span>
            在线
          </div>
        </header>

        <div id="messages" class="messages" aria-live="polite"></div>

        <form id="chatForm" class="composer">
          <label class="sr-only" for="messageInput">输入你的购物需求</label>
          <textarea
            id="messageInput"
            rows="1"
            placeholder="例如：想买一份适合送朋友的零食礼盒"
            autocomplete="off"
          ></textarea>
          <button id="sendButton" type="submit" aria-label="发送">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3.7 20.3 21 12 3.7 3.7l2.1 6.5 8.3 1.8-8.3 1.8-2.1 6.5Z" />
            </svg>
          </button>
        </form>
      </section>

      <aside class="recommendation-panel" id="recPanel" aria-label="商品推荐卡片">
        <div class="recommendation-header">
          <div class="rec-handle" aria-hidden="true"></div>
          <div>
            <p class="eyebrow">商品推荐</p>
            <h2>为你精选</h2>
          </div>
          <button type="button" class="rec-close" aria-label="关闭推荐面板">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
          <span id="recommendationMode" class="mode-pill">等待需求</span>
        </div>
        <div id="recommendationList" class="recommendation-list">
          <section class="recommendation-empty">
            <strong>还没有推荐</strong>
            <span>发送你的需求后，右侧会由大模型生成商品卡片和二维码。</span>
          </section>
        </div>
      </aside>
      <div class="rec-backdrop" id="recBackdrop" aria-hidden="true"></div>
      <button type="button" class="rec-toggle" id="recToggle" aria-label="查看推荐">
        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="7" height="8" rx="1.5" fill="currentColor"/><rect x="14" y="3" width="7" height="8" rx="1.5" fill="currentColor" opacity="0.55"/><rect x="3" y="13" width="7" height="8" rx="1.5" fill="currentColor" opacity="0.55"/><rect x="14" y="13" width="7" height="8" rx="1.5" fill="currentColor" opacity="0.35"/></svg>
        <span>推荐</span>
      </button>
    </main>

    <script type="module" src="/app.js?v=20260618-markdown"></script>
  </body>
</html>
